<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewJaisa Deep Compare</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f3f4f6; padding: 20px; margin: 0; color: #111827; }
        .widget { max-width: 1300px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: #0f172a; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
        .verdict { margin: 20px; padding: 18px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; color: #14532d; font-size: 15px; line-height: 1.5;}
        
        .table-wrap { overflow-x: auto; padding: 0 20px 20px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1000px; }
        th, td { padding: 14px; border: 1px solid #e5e7eb; text-align: left; vertical-align: top; font-size: 13px; word-wrap: break-word; }
        th { background: #f8fafc; color: #334155; font-weight: 700; }
        
        .refurb-cell { background: #eff6ff; border-left: 2px solid #2563eb !important; border-right: 2px solid #2563eb !important; }
        
        .price-block { margin: 8px 0; }
        .price { font-size: 18px; font-weight: 800; color: #0f172a; }
        .refurb-price { color: #2563eb; }
        .original-price { font-size: 12px; color: #64748b; margin-bottom: 2px; display: block;}
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .badge-refurb { background: #2563eb; color: white; }
        .badge-new { background: #64748b; color: white; }
        
        .win-tag { padding: 4px 8px; border-radius: 4px; font-weight: 700; font-size: 11px; display: inline-block;}
        .win-refurb { background: #dcfce7; color: #166534; }
        .win-competitor { background: #f1f5f9; color: #475569; }
        
        .amz-btn { color: #2563eb; text-decoration: none; font-weight: 600; font-size: 11px; margin-top: 10px; display: inline-block; }
        .loading { text-align: center; padding: 60px; color: #64748b; font-weight: 600; font-size: 16px; }
        .error-box { text-align: center; padding: 60px; color: #dc2626; font-weight: 600; font-size: 16px; background: #fef2f2; border: 1px dashed #f87171; margin: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="widget">
        <div class="header">
            <h3 style="margin:0;">NewJaisa Market Analysis</h3>
            <select id="modelPicker" style="padding:10px; border-radius:6px; border:none; min-width: 280px;"></select>
        </div>
        <div id="main"></div>
    </div>

    <script>
        const PAYLOADS = {
            t490s: { 
                selected_model: { 
                    product_title: "ThinkPad T490s Premium", 
                    our_price: 22899, 
                    original_mrp: 115000, 
                    specs: { processor: "Intel Core i5 8th Gen", ram: "16 GB DDR4", storage: "512 GB SSD", os: "Windows 11 Pro", screen_size: "14 Inch" } 
                } 
            },
            hp840: { 
                selected_model: { 
                    product_title: "HP EliteBook 840 G6", 
                    our_price: 26999, 
                    original_mrp: 125000, 
                    specs: { processor: "Intel Core i7 8th Gen", ram: "16 GB DDR4", storage: "512 GB SSD", os: "Windows 11 Pro", screen_size: "14 Inch" } 
                } 
            }
        };

        const picker = document.getElementById("modelPicker");
        Object.keys(PAYLOADS).forEach(k => { 
            const o = document.createElement("option"); 
            o.value = k; 
            o.textContent = `${PAYLOADS[k].selected_model.product_title} (₹${PAYLOADS[k].selected_model.our_price})`; 
            picker.appendChild(o); 
        });

        async function run() {
            const container = document.getElementById("main");
            container.innerHTML = '<div class="loading">Fetching Top Sellers in the 90%-120% Price Bracket...</div>';
            try {
                const payload = PAYLOADS[picker.value];
                const res = await fetch("/api/compare", { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify(payload) 
                });
                
                // 1. Parse the data first to check for backend errors
                const data = await res.json();
                
                // 2. Safely throw the error if something went wrong or no laptops were found
                if (!res.ok || data.error) {
                    throw new Error(data.error || "Failed to load comparison data.");
                }

                const { selected_model: refurb, competitors, review } = data;

                container.innerHTML = `
                    <div class="verdict"><strong>📊 Final Verdict:</strong> ${review.final_verdict}</div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:140px;">Parameter</th>
                                    <th class="refurb-cell">
                                        <span class="badge badge-refurb">Premium Refurbished</span><br>
                                        <strong>${refurb.product_title}</strong>
                                        <div class="price-block">
                                            <span class="original-price">Original New Price: <del>₹${refurb.original_mrp.toLocaleString()}</del></span>
                                            <span class="price refurb-price">₹${refurb.our_price.toLocaleString()}</span>
                                        </div>
                                    </th>
                                    ${competitors.map(c => `
                                        <th>
                                            <span class="badge badge-new">Brand New</span><br>
                                            <strong>${c.product_title.substring(0, 50)}...</strong>
                                            <div class="price-block">
                                                <span class="original-price">Current Live Price</span>
                                                <span class="price">₹${c.price.toLocaleString()}</span>
                                            </div>
                                            <a href="${c.url}" target="_blank" class="amz-btn">View on Amazon ↗</a>
                                        </th>
                                    `).join('')}
                                    <th style="width:100px;">Winner</th>
                                    <th style="width:160px;">Reason</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${review.comparison_rows.map(r => `
                                    <tr>
                                        <td><strong>${r.parameter}</strong></td>
                                        <td class="refurb-cell">${r.refurb_val}</td>
                                        ${r.new_vals.map(v => `<td>${v}</td>`).join('')}
                                        <td><span class="win-tag ${r.winner.includes('Refurb') ? 'win-refurb' : 'win-competitor'}">${r.winner}</span></td>
                                        <td>${r.reason}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (e) { 
                // Catch the zero-survivors error elegantly
                container.innerHTML = `<div class="error-box">⚠ ${e.message}</div>`; 
            }
        }
        picker.addEventListener("change", run);
        run();
    </script>
</body>
</html>
