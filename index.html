<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NewJaisa Pro Sync</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --navy: #0c1222;
            --slate: #475569;
            --muted: #94a3b8;
            --blue: #3b82f6;
            --blue-deep: #1e40af;
            --green: #10b981;
            --orange: #f59e0b;
            --surface: #f8fafc;
            --border: #e2e8f0;
            --card: #ffffff;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --col-shadow: 4px 0 12px -4px rgba(0,0,0,0.07);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            width: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--surface);
            color: var(--navy);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-bar {
            background: var(--card);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 500;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            width: 100%;
        }
        .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .brand-icon {
            width: 30px; height: 30px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--blue), var(--blue-deep));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 12px;
        }
        .brand-text { min-width: 0; }
        .brand-text h3 { font-size: 13px; font-weight: 700; color: var(--navy); letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .brand-text span { font-size: 9px; color: var(--muted); font-weight: 500; display: block; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        select {
            background: var(--surface); color: var(--navy);
            border: 1px solid var(--border); padding: 7px 10px;
            border-radius: 8px; font-size: 11px; font-weight: 600;
            font-family: inherit; outline: none; cursor: pointer;
            max-width: 150px; flex-shrink: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        select:focus { border-color: var(--blue); }

        .container {
            width: 100%;
            padding: 0 0 100px;
        }

        .products-header {
            position: sticky;
            top: 51px;
            z-index: 400;
            background: var(--card);
            border-bottom: 2px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
        }
        .product-col {
            padding: 12px 10px;
            text-align: center;
            position: relative;
            min-width: 0;
        }
        .product-col.col-refurb {
            background: #f0f7ff;
            border-right: 2px solid var(--border);
            box-shadow: var(--col-shadow);
            z-index: 2;
        }
        .product-col.comp-extra { display: none; }

        .product-tag {
            display: inline-block; font-size: 8px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 2px 7px; border-radius: 4px; margin-bottom: 5px;
        }
        .tag-refurb { background: #dbeafe; color: var(--blue-deep); }
        .tag-new { background: #fef3c7; color: #92400e; }
        .product-name {
            font-size: 10px; font-weight: 600; color: var(--slate);
            line-height: 1.35; margin-bottom: 4px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            min-height: 27px;
            word-break: break-word;
        }
        .product-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px; font-weight: 700; color: var(--navy);
            letter-spacing: -0.5px;
        }
        .rank-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 4px;
            font-size: 8px;
            font-weight: 700;
            color: var(--orange);
            flex-wrap: wrap;
        }
        .rank-line svg { width: 11px; height: 11px; fill: var(--orange); flex-shrink: 0; }
        .sold-line {
            font-size: 8px;
            font-weight: 600;
            color: var(--muted);
            margin-top: 2px;
        }

        .section-label {
            padding: 8px 14px; font-size: 9px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted); background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 6px;
            width: 100%;
        }
        .section-label svg { width: 13px; height: 13px; fill: var(--muted); flex-shrink: 0; }

        .spec-row-wrap {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            width: 100%;
        }
        .spec-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
        }
        .spec-cell {
            padding: 14px 10px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; gap: 3px;
            position: relative;
            min-width: 0;
        }
        .spec-cell.col-refurb {
            background: #f8fbff;
            border-right: 2px solid var(--border);
            box-shadow: var(--col-shadow);
            z-index: 2;
        }
        .spec-cell.comp-extra { display: none; }

        .spec-label-mobile {
            font-size: 8px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
            color: var(--muted);
        }
        .spec-val {
            font-size: 13px; font-weight: 600;
            color: var(--navy); line-height: 1.3;
            word-break: break-word;
        }
        .spec-cell.winner .spec-val { color: var(--green); font-weight: 700; }
        .spec-cell.winner::after {
            content: ''; position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 28px; height: 3px;
            background: var(--green); border-radius: 2px;
        }
        .winner-badge {
            display: none;
            width: 16px; height: 16px;
            background: var(--green); border-radius: 50%;
            align-items: center; justify-content: center;
        }
        .winner-badge svg { width: 9px; height: 9px; stroke: white; fill: none; stroke-width: 3; }
        .spec-cell.winner .winner-badge { display: inline-flex; }

        .reason-strip {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
            background: var(--card);
            width: 100%;
        }
        .reason-strip-inner { min-height: 0; overflow: hidden; }
        .reason-strip-content {
            padding: 0 14px;
            opacity: 0;
            transition: opacity 0.3s ease 0.05s, padding 0.35s ease;
            border-top: 1px dashed var(--border);
            background: linear-gradient(135deg, #f0fdf4, #fafffe);
        }
        .reason-strip-tag {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 8px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--green); margin-bottom: 4px;
        }
        .reason-strip-tag svg { width: 12px; height: 12px; fill: var(--green); }
        .reason-strip-body {
            font-size: 11px; line-height: 1.6;
            color: var(--slate); font-weight: 500;
        }

        .spec-row-wrap.reason-visible .reason-strip { grid-template-rows: 1fr; }
        .spec-row-wrap.reason-visible .reason-strip-content { opacity: 1; padding: 10px 14px; }

        .verdict-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--navy); color: white;
            padding: 14px 18px;
            padding-bottom: max(14px, env(safe-area-inset-bottom));
            z-index: 600;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }
        .verdict-label {
            font-size: 8px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--blue); margin-bottom: 3px;
        }
        .verdict-text {
            font-size: 12px; line-height: 1.5;
            font-weight: 400; color: rgba(255,255,255,0.9);
        }

        .loading-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 120px 20px; gap: 16px;
        }
        .loader {
            width: 28px; height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state span { font-size: 12px; font-weight: 600; color: var(--muted); }
        .error-state { text-align: center; padding: 80px 24px; }
        .error-state .err-icon { font-size: 28px; margin-bottom: 10px; }
        .error-state h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        .error-state p { font-size: 11px; color: var(--slate); line-height: 1.5; max-width: 300px; margin: 0 auto; }

        .pc-label { display: none !important; }
        .pc-reason { display: none !important; }
        .col-header-label { display: none !important; }
        .col-header-reason { display: none !important; }

        @media (min-width: 769px) {
            .container { max-width: 1280px; margin: 0 auto; padding: 16px 24px 80px; }

            .products-header {
                position: static;
                border-radius: var(--radius) var(--radius) 0 0;
                overflow: visible;
                box-shadow: var(--shadow-md);
                border: 1px solid var(--border);
                border-bottom: 2px solid var(--border);
            }
            .products-grid .col-header-label {
                display: flex !important; align-items: center; padding: 0 20px;
                font-size: 11px; font-weight: 700;
                text-transform: uppercase; letter-spacing: 0.8px;
                color: var(--muted);
                border-right: 2px solid var(--border);
                background: var(--surface);
            }
            .products-grid .col-header-reason {
                display: flex !important; align-items: center; padding: 0 20px;
                font-size: 11px; font-weight: 700;
                text-transform: uppercase; letter-spacing: 0.8px;
                color: var(--green);
                background: linear-gradient(135deg, #f0fdf4, #f8fafc);
                border-left: 2px solid var(--border); gap: 6px;
            }
            .products-grid .col-header-reason svg { width: 14px; height: 14px; fill: var(--green); }
            .product-col { min-width: 0; padding: 16px 14px; }
            .product-col.col-refurb { box-shadow: var(--col-shadow); }
            .product-name { font-size: 11px; min-height: 31px; }
            .product-price { font-size: 18px; }
            .product-tag { font-size: 9px; }
            .rank-line { font-size: 9px; }
            .sold-line { font-size: 8px; }

            .product-col.comp-extra { display: block; }
            .spec-cell.comp-extra { display: flex; }

            .section-label { display: none; }
            .spec-section-pc {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
                box-shadow: var(--shadow-sm);
            }
            .spec-section-pc:last-of-type {
                border-radius: 0 0 var(--radius) var(--radius);
                overflow: hidden;
            }

            .pc-label {
                display: flex !important;
                align-items: center; gap: 8px;
                padding: 0 20px;
                font-size: 12px; font-weight: 600; color: var(--slate);
                background: var(--surface);
                border-right: 2px solid var(--border);
                min-height: 64px;
            }
            .pc-label svg { width: 15px; height: 15px; fill: var(--muted); flex-shrink: 0; }
            .spec-label-mobile { display: none; }
            .spec-cell { min-width: 0; padding: 16px 14px; min-height: 64px; }
            .spec-val { font-size: 14px; }

            .pc-reason {
                display: flex !important;
                align-items: center; padding: 14px 20px;
                font-size: 12px; line-height: 1.6;
                color: var(--slate); font-weight: 500;
                border-left: 2px solid var(--border);
                background: linear-gradient(135deg, #fafffe, #f8fafc);
            }
            .pc-reason .reason-icon {
                color: var(--green); font-weight: 700;
                margin-right: 6px; flex-shrink: 0;
            }

            .reason-strip { display: none !important; }

            .verdict-bar {
                position: static;
                border-radius: var(--radius);
                margin-top: 16px;
                box-shadow: var(--shadow-md);
            }
            .verdict-text { font-size: 14px; max-width: 800px; }
        }
    </style>
</head>
<body>
    <div class="app-bar">
        <div class="brand">
            <div class="brand-icon">NJ</div>
            <div class="brand-text">
                <h3>NewJaisa Pro Sync</h3>
                <span id="headerModelTag">Syncing...</span>
            </div>
        </div>
        <select id="modelPicker"></select>
    </div>

    <div class="container" id="main"></div>

    <script>
        const ICONS = {
            "Processor":          `<svg viewBox="0 0 24 24"><path d="M17,11H15V9H17V11M13,11H11V9H13V11M13,15H11V13H13V15M17,15H15V13H17V15M9,11H7V9H9V11M9,15H7V13H9V15M21,11V9H19V11H21M21,15V13H19V15H21M5,11V9H3V11H5M5,15V13H3V15H5M15,21V19H13V21H15M11,21V19H9V21H11M15,5V3H13V5H15M11,5V3H9V5H11M2,7V17H5V19H7V22H17V19H19V17H22V7H19V5H17V2H7V5H5V7H2M7,7H17V17H7V7Z"/></svg>`,
            "RAM":                `<svg viewBox="0 0 24 24"><path d="M2,7V17H3V19H4V21H5V19H6V17H7V19H8V21H9V19H10V17H11V19H12V21H13V19H14V17H15V19H16V21H17V19H18V17H21V15H22V9H21V7H2M7,9H17V15H7V9Z"/></svg>`,
            "Storage (HDD/SSD)":  `<svg viewBox="0 0 24 24"><path d="M6,2H18A2,2 0 0,1 20,4V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V4A2,2 0 0,1 6,2M12,4A1,1 0 0,0 11,5A1,1 0 0,0 12,6A1,1 0 0,0 13,5A1,1 0 0,0 12,4M12,8A1,1 0 0,0 11,9A1,1 0 0,0 12,10A1,1 0 0,0 13,9A1,1 0 0,0 12,8M12,12A1,1 0 0,0 11,13A1,1 0 0,0 12,14A1,1 0 0,0 13,13A1,1 0 0,0 12,12M12,16A4,4 0 1,0 16,20A4,4 0 0,0 12,16M12,18A2,2 0 1,1 10,20A2,2 0 0,1 12,18Z"/></svg>`,
            "Battery Life":      `<svg viewBox="0 0 24 24"><path d="M16.67,4H15V2H9V4H7.33A1.33,1.33 0 0,0 6,5.33V20.67C6,21.4 6.6,22 7.33,22H16.67A1.33,1.33 0 0,0 18,20.67V5.33A1.33,1.33 0 0,0 16.67,4M15,14H9V12H15V14M15,10H9V8H15V10Z"/></svg>`,
            "OS":                 `<svg viewBox="0 0 24 24"><path d="M3,12V6.75L9,5.43V11.91L3,12M20,3V11.75L10,11.9V5.21L20,3M3,13L9,13.09V19.9L3,18.75V13M10,13.25L20,13.5V22L10,20.09V13.25Z"/></svg>`,
            "Screen Size":        `<svg viewBox="0 0 24 24"><path d="M21,16H3V4H21M21,2H3C1.89,2 1,2.89 1,4V16A2,2 0 0,0 3,18H10V20H8V22H16V20H14V18H21A2,2 0 0,0 23,16V4C23,2.89 22.1,2 21,2Z"/></svg>`,
            "default":            `<svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>`
        };

        const SPEC_GROUPS = {
            "Core Hardware": ["Processor", "RAM", "Storage (HDD/SSD)", "OS", "Screen Size"],
            "Real-World Performance": ["Consistent Performance", "Display Quality", "Build Quality", "Thermals", "Handling & Portability", "Battery Life"]
        };

        const PAYLOADS = {
            t490s: { selected_model: { product_title: "ThinkPad T490s Premium", our_price: 22899, original_mrp: 115000, specs: { processor: "Intel Core i5 8th Gen", ram: "16 GB DDR4", storage: "512 GB SSD", os: "Windows 11 Pro", screen_size: "14 Inch" } } },
            hp840: { selected_model: { product_title: "HP EliteBook 840 G6", our_price: 26999, original_mrp: 125000, specs: { processor: "Intel Core i7 8th Gen", ram: "16 GB DDR4", storage: "512 GB SSD", os: "Windows 11 Pro", screen_size: "14 Inch" } } }
        };

        const picker = document.getElementById("modelPicker");
        Object.keys(PAYLOADS).forEach(k => {
            const o = document.createElement("option");
            o.value = k;
            o.textContent = PAYLOADS[k].selected_model.product_title;
            picker.appendChild(o);
        });

        function getIcon(p) { return ICONS[p] || ICONS["default"]; }

        function groupRows(rows) {
            const grouped = {};
            for (const [g, params] of Object.entries(SPEC_GROUPS)) {
                grouped[g] = rows.filter(r => params.includes(r.parameter));
            }
            const all = Object.values(SPEC_GROUPS).flat();
            const rest = rows.filter(r => !all.includes(r.parameter));
            if (rest.length) grouped["Other"] = rest;
            return grouped;
        }

        function formatTopPercent(value) {
            const n = Number(value || 0);
            if (!n || n < 1) return "Top ranked";
            return `Top ${n}%`;
        }

        function formatMonthlySold(count) {
            const n = Number(count || 0);
            if (!n) return "";
            if (n >= 1000) return `${Math.round(n / 1000)}K+ bought/mo`;
            return `${n}+ bought/mo`;
        }

        let scrollObserver = null;

        async function run() {
            const container = document.getElementById("main");
            container.innerHTML = `
                <div class="loading-state">
                    <div class="loader"></div>
                    <span>Fetching Amazon prices & AI analysis...</span>
                </div>`;

            if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }

            try {
                const res = await fetch("/api/compare", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(PAYLOADS[picker.value])
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || `Server error (${res.status})`);
                }

                const data = await res.json();
                const { selected_model: refurb, competitors, review } = data;
                document.getElementById("headerModelTag").textContent = refurb.product_title;

                const comps = [...(competitors || [])].sort((a, b) => {
                    const pctA = Number(a.top_percent_in_price || Number.MAX_SAFE_INTEGER);
                    const pctB = Number(b.top_percent_in_price || Number.MAX_SAFE_INTEGER);
                    if (pctA !== pctB) return pctA - pctB;

                    const rankA = Number(a.sales_rank || Number.MAX_SAFE_INTEGER);
                    const rankB = Number(b.sales_rank || Number.MAX_SAFE_INTEGER);
                    if (rankA !== rankB) return rankA - rankB;

                    return Number(a.price || 0) - Number(b.price || 0);
                }).slice(0, 2);

                const numComps = comps.length;
                const grouped = groupRows(review.comparison_rows);

                const checkSvg = `<div class="winner-badge"><svg viewBox="0 0 24 24"><path d="M20 6L9 17L4 12" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
                const aiIconSvg = `<svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M11,16.5L6.5,12L7.91,10.59L11,13.67L16.59,8.09L18,9.5L11,16.5Z"/></svg>`;
                const gearSvg = `<svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>`;
                const trophySvg = `<svg viewBox="0 0 24 24"><path d="M18,2H6C5.45,2 5,2.45 5,3V5.26C3.87,5.6 3,6.67 3,7.92C3,9.5 4.22,10.78 5.76,10.97C6.28,12.06 7.25,12.9 8.43,13.26L8,18H7A2,2 0 0,0 5,20V21H19V20A2,2 0 0,0 17,18H16L15.57,13.26C16.75,12.9 17.72,12.06 18.24,10.97C19.78,10.78 21,9.5 21,7.92C21,6.67 20.13,5.6 19,5.26V3C19,2.45 18.55,2 18,2M5,7.92C5,7.65 5.22,7.42 5.5,7.42H6V9.42C5.43,9.17 5,8.59 5,7.92M18,9.42V7.42H18.5C18.78,7.42 19,7.65 19,7.92C19,8.59 18.57,9.17 18,9.42Z"/></svg>`;

                let html = '';

                html += `<div class="products-header"><div class="products-grid">`;
                html += `<div class="col-header-label">Spec</div>`;
                html += `
                    <div class="product-col col-refurb">
                        <span class="product-tag tag-refurb">Refurbished</span>
                        <div class="product-name">${refurb.product_title}</div>
                        <div class="product-price">₹${refurb.our_price.toLocaleString()}</div>
                    </div>`;
                comps.forEach((c, i) => {
                    const extraClass = i > 0 ? ' comp-extra' : '';
                    html += `
                    <div class="product-col${extraClass}">
                        <span class="product-tag tag-new">${formatTopPercent(c.top_percent_in_price)} in price range</span>
                        <div class="product-name">${c.product_title}</div>
                        <div class="product-price">₹${Number(c.price || 0).toLocaleString()}</div>
                        <div class="rank-line">${trophySvg} ${formatTopPercent(c.top_percent_in_price)} in this price range</div>
                        ${c.monthly_sold ? `<div class="sold-line">${formatMonthlySold(c.monthly_sold)}</div>` : ''}
                    </div>`;
                });
                html += `<div class="col-header-reason">${aiIconSvg} AI Reason</div>`;
                html += `</div></div>`;

                for (const [groupName, rows] of Object.entries(grouped)) {
                    if (!rows.length) continue;

                    html += `<div class="spec-section-pc">
                        <div class="section-label">${gearSvg} ${groupName}</div>`;

                    rows.forEach(r => {
                        const rv = r.refurb_val.toLowerCase().trim();
                        const isTie = r.winner.toLowerCase() === 'tie';
                        const isRF = !isTie && r.winner.toLowerCase().includes('refurb');
                        const icon = getIcon(r.parameter);

                        const compWinners = r.new_vals.slice(0, numComps).map(v => {
                            const cv = v.toLowerCase().trim();
                            if (rv === cv || isTie) return '';
                            return isRF ? '' : 'winner';
                        });

                        html += `
                        <div class="spec-row-wrap" data-reason>
                            <div class="spec-row">
                                <div class="pc-label">${icon} ${r.parameter}</div>
                                <div class="spec-cell col-refurb${isRF ? ' winner' : ''}">
                                    <span class="spec-label-mobile">${r.parameter}</span>
                                    <span class="spec-val">${r.refurb_val}</span>
                                    ${isRF ? checkSvg : ''}
                                </div>`;

                        comps.forEach((c, i) => {
                            const val = r.new_vals[i] || r.new_vals[0] || '—';
                            const cls = compWinners[i] || '';
                            const extraClass = i > 0 ? ' comp-extra' : '';
                            html += `
                                <div class="spec-cell${cls ? ' ' + cls : ''}${extraClass}">
                                    <span class="spec-val">${val}</span>
                                    ${cls === 'winner' ? checkSvg : ''}
                                </div>`;
                        });

                        html += `
                                <div class="pc-reason"><span class="reason-icon">✦</span> ${r.reason}</div>
                            </div>
                            <div class="reason-strip">
                                <div class="reason-strip-inner">
                                    <div class="reason-strip-content">
                                        <div class="reason-strip-tag">${aiIconSvg} AI Reason</div>
                                        <div class="reason-strip-body">${r.reason}</div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    });

                    html += `</div>`;
                }

                html += `
                <div class="verdict-bar">
                    <div class="verdict-label">Market Verdict</div>
                    <div class="verdict-text">${review.final_verdict}</div>
                </div>`;

                container.innerHTML = html;

                applyGrid(numComps);
                window.addEventListener('resize', () => { applyGrid(numComps); setupMobileObserver(); });
                setupMobileObserver();

            } catch (err) {
                container.innerHTML = `
                    <div class="error-state">
                        <div class="err-icon">⚠️</div>
                        <h4>Comparison Failed</h4>
                        <p>${err.message}</p>
                    </div>`;
            }
        }

        function applyGrid(numComps) {
            const isDesktop = window.innerWidth >= 769;
            document.querySelectorAll('.products-grid, .spec-row').forEach(el => {
                if (isDesktop) {
                    const compCols = Array(numComps).fill('1fr').join(' ');
                    el.style.gridTemplateColumns = `170px 1fr ${compCols} 280px`;
                } else {
                    el.style.gridTemplateColumns = '1fr 1fr';
                }
            });
        }

        function setupMobileObserver() {
            if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
            if (window.innerWidth >= 769) {
                document.querySelectorAll('.spec-row-wrap.reason-visible').forEach(el => el.classList.remove('reason-visible'));
                return;
            }

            const headerEl = document.querySelector('.products-header');
            if (!headerEl) return;
            const stickyBottom = headerEl.getBoundingClientRect().bottom;
            const topMargin = -Math.round(stickyBottom + 10);

            scrollObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    entry.target.classList.toggle('reason-visible', entry.isIntersecting);
                });
            }, {
                rootMargin: `${topMargin}px 0px -60% 0px`,
                threshold: 0
            });

            document.querySelectorAll('.spec-row-wrap[data-reason]').forEach(row => scrollObserver.observe(row));
        }

        picker.addEventListener("change", run);
        run();
    </script>
</body>
</html>
